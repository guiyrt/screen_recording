services:
  screen_recorder:
    build: .
    container_name: screen_recorder
    network_mode: host
    ipc: host

    device_cgroup_rules:
      - 'c 116:* rmw'
    
    # Force the container to run as standard user
    user: "1000:1000"

    # Retain supplementary group access to hardware mapped into the container
    group_add:
      - audio
      - video

    volumes:
      # Required to capture the X11 screen
      - /tmp/.X11-unix:/tmp/.X11-unix:ro

      # Audio via pulse
      - /run/user/1000/pulse/native:/run/user/1000/pulse/native
      - ~/.config/pulse/cookie:/home/appuser/.pulse-cookie

      # Data persistence
      - ~/data/:/app/data/

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
              driver: nvidia
              
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility

      - SCREEN__DATA_DIR=/app/data
      - SCREEN__NATS_HOST=nats://127.0.0.1:4222

      - SCREEN__MODE=gpu
      - SCREEN__DISPLAY=${DISPLAY:-:1}

      - SCREEN__AUDIO__MICROPHONE__ENABLED=false
      - SCREEN__AUDIO__MICROPHONE__DEVICE=alsa_input.usb-Plantronics_Plantronics_Blackwire_3210_Series_1B04296BF7CDB648959159348B2CABC2-00.analog-stereo

      - SCREEN__AUDIO__SYSTEM__ENABLED=false
      - SCREEN__AUDIO__SYSTEM__DEVICE=alsa_output.usb-Plantronics_Plantronics_Blackwire_3210_Series_1B04296BF7CDB648959159348B2CABC2-00.mono-fallback.monitor
      
      - SCREEN__RECORDING__OUTPUT_RESOLUTION=3840x2160
      - SCREEN__RECORDING__FPS=30
      - SCREEN__RECORDING__VIDEO_BITRATE=15M
      - SCREEN__RECORDING__MAX_BITRATE=35M

      - SCREEN__STREAMING__ENABLED=false
      - SCREEN__STREAMING__URL=udp://127.0.0.1:1234?pkt_size=1316
      - SCREEN__STREAMING__OUTPUT_RESOLUTION=1920x1080
      - SCREEN__STREAMING__FPS=30
      - SCREEN__STREAMING__BITRATE=4M